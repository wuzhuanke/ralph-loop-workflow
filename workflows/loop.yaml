description: 单步骤循环执行，适合简单任务的持续迭代直到完成

adversarial_check:
  enabled: true
  timeout_ms: 900000

steps:
  - id: loop
    desc: 自动循环执行任务
    do: |
      执行用户指定的任务。

      你需要：
      1. 理解用户需求的每一个要点
      2. 逐一实现或完成每个要求
      3. 遇到问题主动解决，不要跳过或放弃
      4. 完成后在回复最后一行输出 <promise>done</promise>
    input: 用户输入的任务描述
    output: 任务完成的证明（代码、文件、测试结果等）
    check: |
      按以下步骤精确验证，不要漫无目的地探索：

      第一步：列出检查清单
      - 逐条阅读用户需求，拆解为具体的检查点
      - 每个检查点必须是可验证的事实（如"函数X返回Y"、"文件Z存在"）

      第二步：逐项验证
      - 对每个检查点，用最直接的方式验证（读代码、跑命令）
      - 如有测试，运行测试；如有构建，运行构建
      - 不要猜测，只看事实

      第三步：检查明显 bug
      - 检查修改过的文件有没有明显的逻辑错误、空指针、边界遗漏
      - 不需要审查整个项目，只审查本次变更涉及的文件

      通过条件：所有检查点通过，无明显 bug。
      不通过条件：任一检查点失败，或发现明显 bug。

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: done
    on_fail: loop
    max_fail_count: 100
