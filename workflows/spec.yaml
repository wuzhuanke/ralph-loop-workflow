description: 完整的需求分析、规格定义、技术设计、代码实现工作流

adversarial_check:
  enabled: true
  timeout_ms: 900000

steps:
  - id: propose
    desc: 需求分析与方案提议
    do: |
      分析用户需求，输出方案提议文档。

      1. 理解用户需求的核心目标和边界
      2. 分析涉及的模块、组件和功能点
      3. 评估变更影响范围和风险
      4. 输出 `.ralph-flow/artifacts/proposal.md`：
         - 变更概述（为什么做、做什么）
         - 范围与影响（模块、组件、文件）
         - 验收标准（如何验证完成）
      5. 完成后在回复最后一行输出 <promise>done</promise>
    input: 用户提供的任务描述
    output: .ralph-flow/artifacts/proposal.md
    check: |
      检查 proposal.md：
      1. 清晰描述了变更原因和目的
      2. 明确了变更范围和边界
      3. 定义了可验证的验收标准
      4. 没有遗漏用户提到的关键需求

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: specs
    on_fail: propose
    max_fail_count: 3

  - id: specs
    desc: 详细规格定义
    do: |
      基于 proposal 编写详细规格文档。

      1. 输出 `.ralph-flow/artifacts/specs.md`
      2. 使用 delta-spec 格式标注变更类型：
         - **[ADDED]** 新增功能
         - **[MODIFIED]** 修改功能
         - **[REMOVED]** 移除功能
      3. 为每个需求点编写验收场景和边界条件
      4. 覆盖正常流程和异常流程
      5. 完成后在回复最后一行输出 <promise>done</promise>
    input: .ralph-flow/artifacts/proposal.md
    output: .ralph-flow/artifacts/specs.md
    check: |
      检查 specs.md：
      1. 所有需求点使用了正确标记（ADDED/MODIFIED/REMOVED）
      2. 每个功能点都有验收场景
      3. 规格覆盖 proposal 中所有内容
      4. 边界条件已考虑

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: design
    on_fail: specs
    max_fail_count: 3

  - id: design
    desc: 技术方案设计
    do: |
      基于 specs 设计技术实现方案。

      输出 `.ralph-flow/artifacts/design.md`，包含：
      - 整体架构与技术选型
      - 模块划分与职责
      - 核心接口和数据结构设计
      - 文件变更清单
      - 兼容性与风险评估

      方案需覆盖 specs 中所有需求，避免过度设计。
      完成后在回复最后一行输出 <promise>done</promise>
    input: .ralph-flow/artifacts/specs.md
    output: .ralph-flow/artifacts/design.md
    check: |
      检查 design.md：
      1. 技术方案覆盖 specs 中所有需求
      2. 文件清单与变更范围匹配
      3. 架构设计合理，无过度设计
      4. 兼容性和风险已被评估

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: tasks
    on_fail: design
    max_fail_count: 3

  - id: tasks
    desc: 实现任务拆解
    do: |
      基于 design 拆解为可执行的实现任务清单。

      输出 `.ralph-flow/artifacts/tasks.md`，包含：
      - 按模块/层级组织的任务列表
      - 每个任务用 `- [ ]` 标记
      - 任务间依赖关系标注

      每个任务应足够小（可独立完成和验证），按合理顺序排列（基础设施优先，业务逻辑在后）。
      完成后在回复最后一行输出 <promise>done</promise>
    input: .ralph-flow/artifacts/design.md
    output: .ralph-flow/artifacts/tasks.md
    check: |
      检查 tasks.md：
      1. design 中所有变更点都有对应任务
      2. 任务颗粒度合理，可独立完成
      3. 任务顺序合理（先基础设施后业务逻辑）
      4. 无遗漏关键步骤

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: implement
    on_fail: tasks
    max_fail_count: 3

  - id: implement
    desc: 代码实现
    do: |
      按 tasks.md 逐一实现所有任务。

      1. 按 tasks.md 中的任务顺序逐一实现
      2. 每完成一个任务，在 tasks.md 中将 `- [ ]` 改为 `- [x]`
      3. 遵循项目现有代码风格和约定，不添加注释（除非项目已有惯例）
      4. 实现过程中：
         - 如发现 design 未考虑到的问题，同步更新 design.md
         - 如发现 specs 需要调整，同步更新 specs.md
      5. 每完成一批任务，运行 lint 和 typecheck 等验证命令
      6. 完成后在回复最后一行输出 <promise>done</promise>
    input: .ralph-flow/artifacts/tasks.md
    output: 实现的代码文件 + 更新后的 tasks.md
    check: |
      严格审查实现质量：

      1. **工具验证**
         - 运行 `npm test` 或相关测试命令
         - 使用 Bash 检查生成的文件是否存在
         - 使用 Grep 搜索 TODO、FIXME、debugger 等残留
         - 检查 tasks.md 中所有 `- [ ]` 是否已完成

      2. **严格标准**，以下情况判定不通过：
         - 有任何测试失败
         - 有 TODO/FIXME/console.log 残留
         - 核心功能未完整实现
         - 编译不通过或有语法错误
         - 需求中有未实现的功能点

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: verify
    on_fail: implement
    max_fail_count: 5

  - id: verify
    desc: 验收与回归检查
    do: |
      对照 specs.md 全面验证实现结果。

      1. 逐一检查 specs.md 中每个需求点是否已实现
      2. 运行完整测试套件
      3. 运行 lint 和 typecheck
      4. 输出 `.ralph-flow/artifacts/verification.md`：
         - 每个需求点的验证结果（通过/未通过）
         - 整体验收结论
      5. 完成后在回复最后一行输出 <promise>done</promise>
    input: specs.md + 实现代码
    output: .ralph-flow/artifacts/verification.md
    check: |
      检查验收是否通过：
      1. specs.md 中所有需求点被覆盖
      2. 全部测试通过
      3. lint/typecheck 无错误
      4. 无已知回归问题

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: archive
    on_fail: implement
    max_fail_count: 3

  - id: archive
    desc: 归档总结
    do: |
      完成变更归档和总结。

      1. 确认所有 artifacts 文件为最终状态：
         - proposal.md, specs.md, design.md, tasks.md
         - 如有 verification.md 也一并确认
      2. 输出 `.ralph-flow/artifacts/summary.md`：
         - 实现了哪些功能
         - 变更了哪些文件
         - 遗留问题和注意事项
      3. 完成后在回复最后一行输出 <promise>done</promise>
    input: 所有 artifacts 文件和实现代码
    output: .ralph-flow/artifacts/summary.md
    check: |
      检查归档是否完整：
      1. 所有 artifacts 文件已更新到最终状态
      2. 变更总结包含完整信息
      3. 无遗留未完成工作

      检查完成后输出：
      - 通过：先说明通过原因，最后一行输出 <promise-check>true</promise-check>
      - 不通过：先说明失败原因，最后一行输出 <promise-check>false</promise-check>
    on_pass: done
    on_fail: verify
    max_fail_count: 3
